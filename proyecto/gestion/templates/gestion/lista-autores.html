<!DOCTYPE html>
<html>
<head>
    <title>Autores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <h1 class="mb-4">Lista de Autores</h1>

    <a href="{% url 'crear_autor' %}" class="btn btn-primary mb-3">
        + Agregar Autor
    </a>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Nacionalidad</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for autor in autores %}
            <tr>
                <td>{{ autor.nombre }}</td>
                <td>{{ autor.correo }}</td>
                <td>{{ autor.nacionalidad }}</td>
                <td>
                    <a href="{% url 'editar_autor' autor.pk %}" class="btn btn-warning btn-sm">Editar</a>
                    <a href="{% url 'eliminar_autor' autor.pk %}" class="btn btn-danger btn-sm">Eliminar</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="text-center">No hay autores registrados</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>
</html>
